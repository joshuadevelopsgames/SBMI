# Use FIRST for Let's Encrypt, then switch to sbmi-ca.conf. sbmi.ca + www.sbmi.ca.
# DocumentRoot /var/www/sbmi.ca. App on 127.0.0.1:3004.
# Requires: sudo a2enmod ssl proxy proxy_http rewrite

<VirtualHost *:80>
    ServerName sbmi.ca
    ServerAlias www.sbmi.ca

    DocumentRoot /var/www/sbmi.ca
    <Directory /var/www/sbmi.ca>
        Require all granted
        Options -Indexes
    </Directory>
    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory /var/www/certbot>
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass /.well-known/acme-challenge/ !
    ProxyPass / http://127.0.0.1:3004/
    ProxyPassReverse / http://127.0.0.1:3004/
</VirtualHost>
