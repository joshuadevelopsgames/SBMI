# Local PostgreSQL for development. Run: docker compose up -d
# Then: set DATABASE_URL in .env (see below) and run npx prisma migrate deploy && npm run db:seed
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sbmi
    ports:
      - "5433:5432"
    volumes:
      - sbmi_pgdata:/var/lib/postgresql/data

volumes:
  sbmi_pgdata:
