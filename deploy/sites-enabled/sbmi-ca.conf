# sbmi.ca + www.sbmi.ca. DocumentRoot /var/www/sbmi.ca. App on 127.0.0.1:3004.
# Requires: sudo a2enmod ssl proxy proxy_http headers rewrite

# HTTP — redirect to HTTPS (and allow Let's Encrypt challenge)
<VirtualHost *:80>
    ServerName sbmi.ca
    ServerAlias www.sbmi.ca

    DocumentRoot /var/www/sbmi.ca
    <Directory /var/www/sbmi.ca>
        Require all granted
    </Directory>
    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory /var/www/certbot>
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# HTTPS — bare domain
<VirtualHost *:443>
    ServerName sbmi.ca

    DocumentRoot /var/www/sbmi.ca
    <Directory /var/www/sbmi.ca>
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/sbmi.ca/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/sbmi.ca/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3004/
    ProxyPassReverse / http://127.0.0.1:3004/
    RequestHeader set X-Forwarded-Proto "https"
</VirtualHost>

# HTTPS — www
<VirtualHost *:443>
    ServerName www.sbmi.ca

    DocumentRoot /var/www/sbmi.ca
    <Directory /var/www/sbmi.ca>
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/sbmi.ca/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/sbmi.ca/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3004/
    ProxyPassReverse / http://127.0.0.1:3004/
    RequestHeader set X-Forwarded-Proto "https"
</VirtualHost>
